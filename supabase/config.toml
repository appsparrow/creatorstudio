# =============================================================================
# Supabase Project Configuration — Creator Studio
# Project ID: tuaniprgfzxzeewxtggm
# =============================================================================
# This config.toml is used by the Supabase CLI (`supabase start`, `supabase db push`,
# `supabase functions deploy`, etc.).
#
# Reference: https://supabase.com/docs/guides/local-development/cli/config
# =============================================================================

[project]
id = "tuaniprgfzxzeewxtggm"

# ---------------------------------------------------------------------------
# API layer (PostgREST)
# ---------------------------------------------------------------------------
[api]
# Port used by the local Supabase API gateway (Kong)
port = 54321
# Schemas exposed through PostgREST — add schemas here if you create additional
# app schemas beyond `public`
schemas = ["public", "storage"]
# Schemas accessible to anonymous / authenticated roles
extra_search_path = ["public", "extensions"]
# Max rows returned by a single REST request — prevents runaway queries
max_rows = 1000

# ---------------------------------------------------------------------------
# PostgreSQL database
# ---------------------------------------------------------------------------
[db]
# Local development DB port (mapped from the Docker container)
port = 54322
# Shadow database used by `supabase db diff` to compute schema changes
shadow_port = 54320
# Postgres major version
major_version = 15

[db.pooler]
# Supavisor connection pooler settings for production (Transaction mode)
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 15
max_client_conn = 100

# ---------------------------------------------------------------------------
# Supabase Studio (local Dashboard)
# ---------------------------------------------------------------------------
[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

# ---------------------------------------------------------------------------
# Inbucket — local email capture for Auth email flows
# ---------------------------------------------------------------------------
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

# ---------------------------------------------------------------------------
# Supabase Auth (GoTrue)
# ---------------------------------------------------------------------------
[auth]
enabled = true
# The URL that Auth will redirect to after OAuth / magic link flows.
# Update this to match your Vercel deployment URL in production.
site_url = "http://localhost:3000"
# Allowed redirect targets for OAuth callbacks
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3001",
  "https://tuaniprgfzxzeewxtggm.supabase.co"
]
# JWT token expiry (seconds) — 1 hour
jwt_expiry = 3600
# Whether to use the old PKCE flow for OAuth (keep false for new apps)
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Disable signups if you want a closed / invite-only beta
enable_signup = true
# Minimum password length
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false
enable_confirmations = false

# OAuth providers — configure credentials in the Supabase Dashboard
# (not in this file, to avoid committing secrets)
# [auth.external.google]
# enabled = true
# client_id = "env(GOOGLE_CLIENT_ID)"
# secret = "env(GOOGLE_CLIENT_SECRET)"

# ---------------------------------------------------------------------------
# Edge Functions
# ---------------------------------------------------------------------------
[functions]
# Deno version used in the Supabase Edge Functions runtime
# Reference: https://supabase.com/docs/guides/functions
verify_jwt = true

# Individual function overrides
# The kling-webhook function must accept unauthenticated POST requests
# because Kling calls it directly without a Supabase JWT.
[functions.kling-webhook]
verify_jwt = false

# ---------------------------------------------------------------------------
# Supabase Storage
# ---------------------------------------------------------------------------
[storage]
enabled = true
# Maximum file upload size — 50 MB (matches the bucket policy in migration 001)
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

# ---------------------------------------------------------------------------
# Realtime
# ---------------------------------------------------------------------------
[realtime]
enabled = true
# IP version for the Realtime server
ip_version = "IPv6"
# Maximum number of concurrent connections per tenant
max_header_length = 4096

# ---------------------------------------------------------------------------
# Analytics (local — uses BigQuery emulator)
# ---------------------------------------------------------------------------
[analytics]
enabled = false
port = 54327
vector_port = 54328
# Set to "postgres" for local development
backend = "postgres"
